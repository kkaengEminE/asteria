<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asteria</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <h1 id="app-title">Asteria</h1>
            <p>Magazine generation workspace</p>
          </div>
          <span class="mode">Mock default</span>
        </header>

        <form id="generate-form" class="control-panel" novalidate>
          <label class="field field-topic">
            <span>Topic</span>
            <textarea id="topic" name="topic" rows="3" placeholder="고양이가 밤에 뛰어다니는 이유"></textarea>
          </label>

          <label class="field">
            <span>Magazine</span>
            <select id="magazine" name="magazine">
              <option value="cat">cat</option>
              <option value="dog">dog</option>
            </select>
          </label>

          <label class="field">
            <span>Language</span>
            <select id="language" name="language">
              <option value="ko-KR">ko-KR</option>
              <option value="en-US">en-US</option>
            </select>
          </label>

          <label class="field">
            <span>AI Provider</span>
            <select id="provider" name="provider">
              <option value="mock">Mock</option>
              <option value="gemini">Gemini</option>
              <option value="openai">OpenAI</option>
            </select>
          </label>

          <button id="generate-button" type="submit">Generate</button>
        </form>

        <section class="preset-panel" aria-labelledby="preset-title">
          <h2 id="preset-title">Test topics</h2>
          <div id="topic-presets" class="preset-list">
            <button type="button" class="preset-button" data-topic-preset="고양이가 밤에 뛰어다니는 이유">고양이가 밤에 뛰어다니는 이유</button>
            <button type="button" class="preset-button" data-topic-preset="고양이가 자꾸 상자에 들어가는 이유">고양이가 자꾸 상자에 들어가는 이유</button>
            <button type="button" class="preset-button" data-topic-preset="실내 고양이를 위한 놀이 방법">실내 고양이를 위한 놀이 방법</button>
            <button type="button" class="preset-button" data-topic-preset="고양이가 물을 잘 마시지 않는 이유">고양이가 물을 잘 마시지 않는 이유</button>
            <button type="button" class="preset-button" data-topic-preset="초보 집사가 자주 하는 실수">초보 집사가 자주 하는 실수</button>
          </div>
        </section>

        <p id="form-message" class="message" role="status"></p>

        <div class="copy-panel" aria-label="Copy generated content">
          <button id="copy-article-button" class="secondary-button" type="button" disabled>Copy Article</button>
          <button id="copy-markdown-button" class="secondary-button" type="button" disabled>Copy Markdown</button>
          <button id="export-review-button" class="secondary-button" type="button" disabled>Export Review</button>
          <button id="save-wordpress-draft-button" class="secondary-button" type="button" disabled>Save to WordPress Draft</button>
          <span id="copy-feedback" class="copy-feedback" role="status"></span>
        </div>
        <div id="wordpress-draft-status" class="draft-status" role="status" aria-live="polite">
          <strong>Ready</strong>
          <span>Generate content to enable draft saving.</span>
        </div>

        <section class="history-panel" aria-labelledby="history-title">
          <div class="history-header">
            <h2 id="history-title">History</h2>
            <div class="history-actions">
              <button id="compare-button" class="secondary-button" type="button" disabled>Compare</button>
              <button id="exit-compare-button" class="secondary-button" type="button" hidden>Exit Compare</button>
              <button id="clear-history-button" class="secondary-button" type="button" disabled>Clear History</button>
            </div>
          </div>
          <div id="history-list" class="history-list">
            <p class="history-empty">No generated results yet.</p>
          </div>
        </section>

        <section id="result" class="result empty" aria-live="polite">
          <div class="empty-state">
            <h2>Ready</h2>
            <p>Enter a topic, choose a magazine and language, then generate a preview package.</p>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
